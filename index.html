    <!-- Toast / Modal 容器 -->
    <div class="toast-wrap" id="toast-wrap"></div>
    <div id="modal-root"></div>

    <script>
        // =============================================================
        // 思政刷题 · 报告委员长 - 主程序 (题库外部加载版)
        // =============================================================
        "use strict";

        // ---------- 全局变量: 题库将在加载后赋值 ----------
        let QUESTION_BANK = null;
        let QBankReady = false;
        let QBankLoading = false;

        const TYPES = { single: '单选题', multi: '多选题', judge: '判断题', essay: '简答题' };
        const TYPE_ORDER = ['single', 'multi', 'judge', 'essay'];
        const NS = 'mac-quiz-';
        const $ = (s, r = document) => r.querySelector(s);
        const $$ = (s, r = document) => [...r.querySelectorAll(s)];

        const el = (tag, props = {}, ...children) => {
            const e = document.createElement(tag);
            for (const k in props) {
                if (k === 'class') e.className = props[k];
                else if (k === 'dataset') Object.assign(e.dataset, props[k]);
                else if (k.startsWith('on') && typeof props[k] === 'function') e.addEventListener(k.slice(2).toLowerCase(),
                    props[k]);
                else if (k === 'html') e.innerHTML = props[k];
                else e.setAttribute(k, props[k]);
            }
            children.flat().forEach(c => {
                if (c == null) return;
                e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
            });
            return e;
        };

        // =============================================================
        // DataLayer - localStorage 持久化
        // =============================================================
        const DataLayer = {
            get(key, fallback = null) {
                try { const v = localStorage.getItem(NS + key); return v == null ? fallback : JSON.parse(v); } catch (e) {
                    return fallback; }
            },
            set(key, value) {
                try { localStorage.setItem(NS + key, JSON.stringify(value)); return true; } catch (e) {
                    Toast.error('存储空间不足，请导出数据后清理'); return false; }
            },
            remove(key) { localStorage.removeItem(NS + key); },
            loadAll() {
                return {
                    settings: this.get('settings', { theme: 'auto', fsQuizStem: 22, bgImage: 0, lastConfig: null }),
                    wrongQuestions: this.get('wrongQuestions', {}),
                    activeSession: this.get('activeSession', null),
                    history: this.get('history', []),
                };
            }
        };

        // =============================================================
        // Toast 通知 (提前定义以便 DataLayer 使用)
        // =============================================================
        const Toast = {
            show(msg, type = 'info', dur = 2400) {
                const wrap = $('#toast-wrap');
                const t = el('div', { class: 'toast ' + type }, msg);
                wrap.appendChild(t);
                setTimeout(() => { t.style.opacity = '0';
                    t.style.transform = 'translateY(-12px)';
                    setTimeout(() => t.remove(), 300); }, dur);
            },
            success(m) { this.show(m, 'success') },
            error(m) { this.show(m, 'error', 3600) },
            warn(m) { this.show(m, 'warn', 3000) },
        };

        // =============================================================
        // Modal 模态
        // =============================================================
        const Modal = {
            show({ title, body, actions }) {
                const root = $('#modal-root');
                root.innerHTML = '';
                const backdrop = el('div', { class: 'modal-backdrop' });
                const card = el('div', { class: 'modal-card glass-window' });
                card.appendChild(el('h3', {}, title));
                card.appendChild(el('p', {}, body));
                const actWrap = el('div', { class: 'modal-actions' });
                actions.forEach(a => {
                    const b = el('button', { class: 'glass-btn ' + (a.kind || ''), onclick: () => { backdrop
                                .remove();
                            a.onClick && a.onClick(); } }, a.label);
                    actWrap.appendChild(b);
                });
                card.appendChild(actWrap);
                backdrop.appendChild(card);
                backdrop.addEventListener('click', (e) => { if (e.target === backdrop) backdrop.remove(); });
                root.appendChild(backdrop);
            }
        };

        // =============================================================
        // Store - 简单状态管理
        // =============================================================
        const Store = {
            state: {},
            subs: new Set(),
            init() {
                this.state = {
                    route: location.hash || '#/home',
                    ...DataLayer.loadAll(),
                    quizSession: null,
                };
                this.applyTheme();
                this.applyFontSize();
                this.applyBackground();
            },
            setState(patch, persistKeys = []) {
                Object.assign(this.state, patch);
                persistKeys.forEach(k => DataLayer.set(k, this.state[k]));
                this.subs.forEach(fn => fn(this.state));
            },
            applyTheme() {
                const t = this.state.settings?.theme || 'auto';
                if (t === 'auto') {
                    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
                    document.documentElement.dataset.theme = dark ? 'dark' : 'light';
                } else {
                    document.documentElement.dataset.theme = t;
                }
            },
            applyFontSize() {
                const fs = this.state.settings?.fsQuizStem || 22;
                document.documentElement.style.setProperty('--fs-quiz-stem', fs + 'px');
            },
            applyBackground() {
                const bg = this.state.settings?.bgImage || 0;
                if (bg === 0) {
                    document.documentElement.style.setProperty('--bg-image', 'none');
                } else {
                    document.documentElement.style.setProperty('--bg-image', 'url("backgrounds/bg-' + bg + '.jpg")');
                }
            },
            updateSettings(patch) {
                this.state.settings = { ...this.state.settings, ...patch };
                DataLayer.set('settings', this.state.settings);
                this.applyTheme();
                this.applyFontSize();
                this.applyBackground();
            }
        };

        // =============================================================
        // QuestionBank - 题库访问 (依赖外部加载)
        // =============================================================
        const QBank = {
            total: () => QBankReady ? Object.values(QUESTION_BANK).flat().length : 0,
            countByType: () => {
                const r = {};
                TYPE_ORDER.forEach(t => r[t] = QBankReady ? (QUESTION_BANK[t] || []).length : 0);
                return r;
            },
            byId(id) {
                if (!QBankReady) return null;
                for (const t of TYPE_ORDER) {
                    const q = (QUESTION_BANK[t] || []).find(q => q.id === id);
                    if (q) return q;
                }
                return null;
            },
            filter(types) {
                if (!QBankReady) return [];
                return types.flatMap(t => QUESTION_BANK[t] || []);
            },
            // 加载题库
            load() {
                if (QBankLoading) return Promise.resolve(false);
                if (QBankReady) return Promise.resolve(true);
                QBankLoading = true;
                const loadingEl = $('#loading-screen');
                if (loadingEl) {
                    loadingEl.innerHTML = `
                        <div class="loading-screen">
                            <div class="loading-spinner"></div>
                            <span>正在加载题库 …</span>
                        </div>
                    `;
                }
                return fetch('question_bank.json')
                    .then(res => {
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        return res.json();
                    })
                    .then(data => {
                        QUESTION_BANK = data;
                        QBankReady = true;
                        QBankLoading = false;
                        if (loadingEl) loadingEl.remove();
                        return true;
                    })
                    .catch(err => {
                        QBankLoading = false;
                        console.error('题库加载失败:', err);
                        if (loadingEl) {
                            loadingEl.innerHTML = `
                                <div class="loading-screen">
                                    <div class="loading-error">
                                        <div style="font-size:48px;margin-bottom:12px;">⚠️</div>
                                        <div style="font-weight:600;font-size:var(--fs-h3);margin-bottom:8px;">题库加载失败</div>
                                        <div style="font-size:var(--fs-body);color:var(--color-text-secondary);max-width:380px;margin:0 auto;">
                                            请确保 <code>question_bank.json</code> 文件与当前页面在同一目录下，且格式正确。
                                            <br><br>
                                            <button class="glass-btn primary retry-btn" onclick="QBank.retryLoad()">重新加载</button>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }
                        return false;
                    });
            },
            retryLoad() {
                const el = $('#loading-screen');
                if (el) {
                    el.innerHTML = `
                        <div class="loading-screen">
                            <div class="loading-spinner"></div>
                            <span>重新加载题库 …</span>
                        </div>
                    `;
                }
                this.load().then(ok => {
                    if (ok) {
                        Toast.success('题库加载成功');
                        // 重新初始化应用
                        Store.init();
                        Router.handle();
                    }
                });
            }
        };

        // =============================================================
        // QuizEngine - 会话生成、判分
        // =============================================================
        const QuizEngine = {
            shuffle(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor((performance.now() * 1000 + i) % (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            },
            create(config) {
                if (!QBankReady) { Toast.error('题库尚未加载'); return null; }
                let pool;
                if (config.onlyWrong) {
                    const wrongIds = Object.keys(Store.state.wrongQuestions || {});
                    pool = wrongIds.map(id => QBank.byId(id)).filter(q => q && config.types.includes(q.type));
                } else {
                    pool = QBank.filter(config.types);
                }
                if (config.order === 'random') pool = this.shuffle(pool);
                const n = config.count === 0 ? pool.length : Math.min(config.count, pool.length);
                return {
                    id: 'sess_' + Date.now().toString(36),
                    config,
                    questions: pool.slice(0, n),
                    answers: {},
                    currentIdx: 0,
                    startedAt: Date.now(),
                    finishedAt: null,
                };
            },
            check(question, userAnswer) {
                if (question.type === 'single' || question.type === 'judge') {
                    return userAnswer === question.answer;
                }
                if (question.type === 'multi') {
                    const u = Array.isArray(userAnswer) ? [...userAnswer].sort().join('') : (userAnswer || '');
                    return u === question.answer;
                }
                return userAnswer === true;
            },
            submit(session, userAnswer) {
                const q = session.questions[session.currentIdx];
                const ok = this.check(q, userAnswer);
                session.answers[q.id] = { user: userAnswer, correct: ok, ts: Date.now() };
                if (!ok) WrongStore.record(q);
                else if (session.config.skipCorrect) WrongStore.removeIfPresent(q.id);
                DataLayer.set('activeSession', session);
                return ok;
            },
            next(session) {
                if (session.currentIdx < session.questions.length - 1) {
                    session.currentIdx++;
                    DataLayer.set('activeSession', session);
                    return true;
                }
                return false;
            },
            finish(session) {
                session.finishedAt = Date.now();
                const total = session.questions.length;
                const correct = Object.values(session.answers).filter(a => a.correct).length;
                const rate = total ? Math.round((correct / total) * 100) : 0;
                const byType = {};
                TYPE_ORDER.forEach(t => byType[t] = { total: 0, correct: 0 });
                session.questions.forEach(q => {
                    byType[q.type].total++;
                    if (session.answers[q.id]?.correct) byType[q.type].correct++;
                });
                const record = {
                    id: session.id,
                    startedAt: session.startedAt,
                    finishedAt: session.finishedAt,
                    total,
                    correct,
                    rate,
                    byType,
                    config: session.config,
                };
                const history = [...(Store.state.history || []), record].slice(-50);
                Store.setState({ history, activeSession: null }, ['history']);
                DataLayer.remove('activeSession');
                return record;
            }
        };

        // =============================================================
        // WrongStore - 错题集
        // =============================================================
        const WrongStore = {
            record(q) {
                const wq = Store.state.wrongQuestions || {};
                const ex = wq[q.id];
                wq[q.id] = {
                    id: q.id,
                    type: q.type,
                    times: (ex?.times || 0) + 1,
                    lastAt: Date.now(),
                    firstAt: ex?.firstAt || Date.now(),
                };
                Store.setState({ wrongQuestions: wq }, ['wrongQuestions']);
            },
            removeIfPresent(id) {
                const wq = Store.state.wrongQuestions || {};
                if (wq[id]) {
                    delete wq[id];
                    Store.setState({ wrongQuestions: wq }, ['wrongQuestions']);
                    return true;
                }
                return false;
            },
            clear() {
                Store.setState({ wrongQuestions: {} }, ['wrongQuestions']);
            },
            list(filterType) {
                const wq = Store.state.wrongQuestions || {};
                let arr = Object.values(wq);
                if (filterType && filterType !== 'all') arr = arr.filter(w => w.type === filterType);
                return arr.sort((a, b) => b.lastAt - a.lastAt);
            },
            countByType() {
                const wq = Store.state.wrongQuestions || {};
                const r = { all: 0 };
                TYPE_ORDER.forEach(t => r[t] = 0);
                Object.values(wq).forEach(w => { r.all++;
                    if (r[w.type] != null) r[w.type]++; });
                return r;
            }
        };

        // =============================================================
        // StatsCalc - 统计计算
        // =============================================================
        const StatsCalc = {
            overall() {
                const h = Store.state.history || [];
                if (!h.length) return { totalSessions: 0, totalQ: 0, totalCorrect: 0, rate: 0, wrongCount: 0,
                wrongRate: 0 };
                const totalQ = h.reduce((s, r) => s + r.total, 0);
                const totalCorrect = h.reduce((s, r) => s + r.correct, 0);
                const rate = totalQ ? Math.round((totalCorrect / totalQ) * 100) : 0;
                const wrongCount = Object.keys(Store.state.wrongQuestions || {}).length;
                const totalBank = QBank.total();
                const wrongRate = totalBank ? Math.round((wrongCount / totalBank) * 100) : 0;
                return { totalSessions: h.length, totalQ, totalCorrect, rate, wrongCount, wrongRate };
            },
            byType() {
                const h = Store.state.history || [];
                const r = {};
                TYPE_ORDER.forEach(t => r[t] = { total: 0, correct: 0 });
                h.forEach(rec => {
                    TYPE_ORDER.forEach(t => {
                        r[t].total += rec.byType[t]?.total || 0;
                        r[t].correct += rec.byType[t]?.correct || 0;
                    });
                });
                return r;
            },
            recent(n = 7) {
                return (Store.state.history || []).slice(-n).map(r => ({
                    date: new Date(r.finishedAt).toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }),
                    rate: r.rate,
                }));
            }
        };

        // =============================================================
        // Router
        // =============================================================
        const Router = {
            routes: {},
            on(hash, fn) { this.routes[hash.replace(/\?.*$/, '')] = fn; },
            start() {
                addEventListener('hashchange', () => this.handle());
                if (!location.hash) location.hash = '#/home';
                else this.handle();
            },
            handle() {
                if (!QBankReady) {
                    // 题库未加载，尝试加载
                    if (!QBankLoading) QBank.load().then(() => { if (QBankReady) this.handle(); });
                    return;
                }
                const full = location.hash || '#/home';
                const [path, qs] = full.split('?');
                const params = {};
                if (qs) qs.split('&').forEach(kv => { const [k, v] = kv.split('=');
                    params[k] = decodeURIComponent(v || ''); });
                Store.setState({ route: full });
                const fn = this.routes[path] || this.routes['#/home'];
                fn(params);
            },
            go(hash) { location.hash = hash; }
        };

        // =============================================================
        // UI Renderers
        // =============================================================
        const UI = {
            tpl(id) { return $('#' + id).content.cloneNode(true); },
            mount(node) {
                const body = $('#app-body');
                body.innerHTML = '';
                body.appendChild(node);
                body.querySelectorAll('[data-go]').forEach(b => b.addEventListener('click', () => Router.go(b.dataset
                .go)));
            },

            renderHome() {
                const f = this.tpl('tpl-home');
                const counts = QBank.countByType();
                const total = TYPE_ORDER.reduce((s, t) => s + counts[t], 0);
                const meta = TYPE_ORDER.map(t => `${TYPES[t]} ${counts[t]}`).join(' · ');
                f.querySelector('#home-meta').textContent = total > 0 ? meta : '题库为空，请检查 question_bank.json';
                const wq = WrongStore.countByType();
                f.querySelector('#home-wrong-meta').textContent = wq.all ? `共 ${wq.all} 题待复习` : '暂无错题，继续保持';
                const stats = StatsCalc.overall();
                f.querySelector('#home-stats-meta').textContent = stats.totalSessions ? `${stats.totalSessions} 次 · 正确率 ${stats.rate}%` :
                    '未开始';
                // resume banner
                const session = DataLayer.get('activeSession');
                if (session && session.questions && session.currentIdx < session.questions.length) {
                    const banner = el('div', { class: 'resume-banner liquid' });
                    banner.appendChild(el('div', { class: 'resume-banner-text' },
                        `⏯ 上次未完成会话 (已答 ${Object.keys(session.answers).length}/${session.questions.length})，是否继续？`
                        ));
                    const acts = el('div', { class: 'resume-banner-actions' });
                    acts.appendChild(el('button', { class: 'glass-btn primary', onclick: () => { Store.setState(
                                { quizSession: session });
                            Router.go('#/quiz'); } }, '继续'));
                    acts.appendChild(el('button', { class: 'glass-btn', onclick: () => { DataLayer.remove(
                                'activeSession');
                            banner.remove(); } }, '放弃'));
                    banner.appendChild(acts);
                    f.querySelector('#resume-slot').appendChild(banner);
                }
                this.mount(f);
            },

            renderQuizSetup() {
                const f = this.tpl('tpl-quiz-setup');
                const counts = QBank.countByType();
                const last = Store.state.settings?.lastConfig || { types: ['single', 'judge'], count: 20, order: 'sequence',
                    onlyWrong: false, skipCorrect: true };
                const config = { ...last };
                const grid = f.querySelector('#type-grid');
                TYPE_ORDER.forEach(t => {
                    const card = el('label', { class: 'type-choice liquid' + (config.types.includes(t) ? ' selected' :
                            '') });
                    const cb = el('input', { type: 'checkbox', value: t });
                    cb.checked = config.types.includes(t);
                    card.appendChild(cb);
                    card.appendChild(el('span', { class: 'tc-label' }, TYPES[t]));
                    card.appendChild(el('span', { class: 'tc-count' }, counts[t] + ''));
                    cb.addEventListener('change', () => {
                        if (cb.checked) { if (!config.types.includes(t)) config.types.push(t); } else config
                            .types = config.types.filter(x => x !== t);
                        card.classList.toggle('selected', cb.checked);
                        updatePreview();
                    });
                    grid.appendChild(card);
                });
                const previewNum = f.querySelector('#preview-num');
                const btnStart = f.querySelector('#btn-start-quiz');

                function updatePreview() {
                    const poolSize = config.onlyWrong ?
                        WrongStore.list().filter(w => config.types.includes(w.type)).length :
                        config.types.reduce((s, t) => s + counts[t], 0);
                    const n = config.count === 0 ? poolSize : Math.min(config.count, poolSize);
                    previewNum.textContent = n;
                    btnStart.disabled = n === 0 || config.types.length === 0;
                }
                const slider = f.querySelector('#count-slider');
                const cv = f.querySelector('#count-value');
                const presets = f.querySelectorAll('.count-preset');
                const setCount = (n) => {
                    config.count = n;
                    slider.value = n === 0 ? slider.max : n;
                    cv.textContent = n === 0 ? '全部' : n;
                    presets.forEach(p => p.classList.toggle('selected', +p.dataset.count === n));
                    updatePreview();
                };
                presets.forEach(p => p.addEventListener('click', () => setCount(+p.dataset.count)));
                slider.addEventListener('input', () => {
                    config.count = +slider.value;
                    cv.textContent = slider.value;
                    presets.forEach(p => p.classList.remove('selected'));
                    updatePreview();
                });
                setCount(config.count);
                const orderSeg = f.querySelector('#order-seg');
                orderSeg.querySelectorAll('.seg-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.order === config.order);
                    b.addEventListener('click', () => {
                        config.order = b.dataset.order;
                        orderSeg.querySelectorAll('.seg-btn').forEach(x => x.classList.toggle('active', x ===
                        b));
                    });
                });
                const ow = f.querySelector('#only-wrong');
                ow.checked = config.onlyWrong;
                ow.addEventListener('change', () => { config.onlyWrong = ow.checked;
                    updatePreview(); });
                const sc = f.querySelector('#skip-correct');
                sc.checked = config.skipCorrect;
                sc.addEventListener('change', () => { config.skipCorrect = sc.checked; });
                btnStart.addEventListener('click', () => {
                    if (!QBankReady) { Toast.warn('题库尚未加载完成'); return; }
                    const session = QuizEngine.create(config);
                    if (!session || !session.questions.length) { Toast.warn('题库为空，请调整配置'); return; }
                    Store.updateSettings({ lastConfig: config });
                    Store.setState({ quizSession: session });
                    DataLayer.set('activeSession', session);
                    Router.go('#/quiz');
                });
                this.mount(f);
            },

            renderQuiz() {
                let session = Store.state.quizSession || DataLayer.get('activeSession');
                if (!session || !session.questions) { Router.go('#/quiz-setup'); return; }
                Store.state.quizSession = session;
                const f = this.tpl('tpl-quiz');
                this.mount(f);
                this.renderQuizQuestion();
            },

            renderQuizQuestion() {
                const session = Store.state.quizSession;
                if (!session) return;
                if (session.currentIdx >= session.questions.length) { this.renderResult(); return; }
                const q = session.questions[session.currentIdx];
                const total = session.questions.length;
                $('#q-counter').textContent = `${session.currentIdx+1} / ${total}`;
                $('#q-progress').style.width = (((session.currentIdx) / total) * 100) + '%';
                const main = $('#quiz-main');
                main.innerHTML = '';
                const answered = session.answers[q.id];
                const meta = el('div', { class: 'q-meta' });
                meta.appendChild(el('span', { class: 'pill-badge' }, `${TYPES[q.type]} · 第 ${session.currentIdx+1} 题`));
                main.appendChild(meta);
                const stem = el('div', { class: 'q-stem-card glass-card' });
                stem.appendChild(el('div', { class: 'q-stem' }, q.question));
                main.appendChild(stem);
                const state = { selected: answered ? answered.user : (q.type === 'multi' ? [] : null), locked: !!answered };
                if (q.type === 'single' || q.type === 'multi') {
                    const list = el('div', { class: 'opt-list' });
                    ['A', 'B', 'C', 'D'].forEach(k => {
                        if (!q.options || !q.options[k]) return;
                        const card = el('button', { class: 'opt-card liquid' });
                        const letter = el('div', { class: 'opt-letter' }, k);
                        const body = el('div', { class: 'opt-body' }, q.options[k]);
                        card.appendChild(letter);
                        card.appendChild(body);
                        const updateCardClass = () => {
                            card.className = 'opt-card';
                            if (state.locked) card.classList.add('locked');
                            if (q.type === 'multi') {
                                if (state.selected.includes(k)) card.classList.add('selected');
                            } else {
                                if (state.selected === k) card.classList.add('selected');
                            }
                            if (state.locked) {
                                const ans = q.answer;
                                const isCorrectOpt = (q.type === 'multi' ? ans.includes(k) : ans === k);
                                const userChose = (q.type === 'multi' ? state.selected.includes(k) : state
                                    .selected === k);
                                if (isCorrectOpt) card.classList.add('correct');
                                else if (userChose) card.classList.add('wrong');
                            }
                        };
                        card.addEventListener('click', () => {
                            if (state.locked) return;
                            if (q.type === 'single') {
                                state.selected = k;
                                list.querySelectorAll('.opt-card').forEach(c => c.classList.remove(
                                'selected'));
                                card.classList.add('selected');
                                this.submitAnswer(state.selected);
                            } else {
                                const i = state.selected.indexOf(k);
                                if (i >= 0) state.selected.splice(i, 1);
                                else state.selected.push(k);
                                updateCardClass();
                                multiSubmitBtn.disabled = state.selected.length === 0;
                            }
                        });
                        updateCardClass();
                        list.appendChild(card);
                    });
                    main.appendChild(list);
                    let multiSubmitBtn = null;
                    if (q.type === 'multi' && !state.locked) {
                        multiSubmitBtn = el('button', { class: 'glass-btn primary large' }, '提交答案');
                        multiSubmitBtn.disabled = true;
                        multiSubmitBtn.addEventListener('click', () => this.submitAnswer([...state.selected].sort()
                            .join('')));
                        main.appendChild(el('div', { class: 'row', style: 'justify-content:center;margin-bottom:16px' },
                            multiSubmitBtn));
                    }
                } else if (q.type === 'judge') {
                    const pair = el('div', { class: 'judge-pair' });
                    ['Y', 'N'].forEach(k => {
                        const btn = el('button', { class: 'judge-btn liquid ' + (k === 'Y' ? 'y' : 'n') }, k ===
                            'Y' ? '✓ 正确' : '✗ 错误');
                        if (state.locked) {
                            btn.classList.add('locked');
                            if (q.answer === k) btn.classList.add('correct');
                            else if (state.selected === k) btn.classList.add('wrong');
                        }
                        btn.addEventListener('click', () => {
                            if (state.locked) return;
                            this.submitAnswer(k);
                        });
                        pair.appendChild(btn);
                    });
                    main.appendChild(pair);
                } else if (q.type === 'essay') {
                    const ta = el('textarea', { class: 'essay-area', placeholder: '请在此输入你的答案...（简答题为自评模式）' });
                    if (answered && answered.userText) ta.value = answered.userText;
                    ta.disabled = state.locked;
                    main.appendChild(ta);
                    const refCard = el('div', { class: 'essay-ref hidden' });
                    refCard.appendChild(el('h4', {}, '参考答案'));
                    refCard.appendChild(el('div', {}, q.answer));
                    main.appendChild(refCard);
                    const judgeWrap = el('div', { class: 'essay-self-judge hidden' });
                    const showRefBtn = el('button', { class: 'glass-btn primary' }, '查看参考答案');
                    showRefBtn.addEventListener('click', () => {
                        refCard.classList.remove('hidden');
                        judgeWrap.classList.remove('hidden');
                        showRefBtn.remove();
                    });
                    judgeWrap.appendChild(el('button', { class: 'glass-btn primary', onclick: () => this.submitEssay(q,
                            ta.value, true) }, '我答对了'));
                    judgeWrap.appendChild(el('button', { class: 'glass-btn danger', onclick: () => this.submitEssay(q,
                            ta.value, false) }, '我答错了'));
                    main.appendChild(el('div', { class: 'row mt-4', style: 'justify-content:center' }, showRefBtn));
                    main.appendChild(judgeWrap);
                    if (state.locked) { refCard.classList.remove('hidden');
                        showRefBtn.remove(); }
                }
                if (answered) this.renderFeedback(q, answered);
                const actions = el('div', { class: 'quiz-actions' });
                const exitBtn = el('button', { class: 'glass-btn', onclick: () => this.exitQuiz() }, '保存并退出');
                actions.appendChild(exitBtn);
                if (answered) {
                    const isLast = session.currentIdx === session.questions.length - 1;
                    const nextBtn = el('button', { class: 'glass-btn primary large', onclick: () => {
                            if (isLast) this.renderResult();
                            else { QuizEngine.next(session);
                                this.renderQuizQuestion(); }
                        } }, isLast ? '查看成绩 →' : '下一题 →');
                    actions.appendChild(nextBtn);
                } else {
                    actions.appendChild(el('button', { class: 'glass-btn', onclick: () => { QuizEngine.submit(session,
                                q.type === 'multi' ? '' : null);
                            QuizEngine.next(session);
                            this.renderQuizQuestion(); } }, '跳过 →'));
                }
                main.appendChild(actions);
                $('#btn-quiz-exit').onclick = () => this.exitQuiz();
                if (answered) {
                    const nextBtn = actions.querySelector('.glass-btn.primary');
                    requestAnimationFrame(() => {
                        (nextBtn || actions).scrollIntoView({ behavior: 'smooth', block: 'center' });
                        if (nextBtn) nextBtn.focus({ preventScroll: true });
                    });
                }
            },

            submitAnswer(userAnswer) {
                const session = Store.state.quizSession;
                QuizEngine.submit(session, userAnswer);
                this.renderQuizQuestion();
            },

            submitEssay(q, text, selfCorrect) {
                const session = Store.state.quizSession;
                session.answers[q.id] = { user: selfCorrect, userText: text, correct: selfCorrect, ts: Date.now() };
                if (!selfCorrect) WrongStore.record(q);
                else if (session.config.skipCorrect) WrongStore.removeIfPresent(q.id);
                DataLayer.set('activeSession', session);
                this.renderQuizQuestion();
            },

            renderFeedback(q, answered) {
                const main = $('#quiz-main');
                const card = el('div', { class: 'feedback-card ' + (answered.correct ? 'correct' : 'wrong') });
                card.appendChild(el('div', { class: 'fb-title' }, answered.correct ? '✓ 答对了' : '✗ 答错了'));
                if (q.type !== 'essay') {
                    const ansText = el('div', { class: 'fb-body' });
                    ansText.innerHTML = `正确答案：<strong>${q.type==='judge' ? (q.answer==='Y'?'正确':'错误') : q.answer}</strong>`;
                    card.appendChild(ansText);
                }
                main.appendChild(card);
            },

            exitQuiz() {
                Modal.show({
                    title: '保存进度并退出？',
                    body: '当前进度已自动保存，下次进入首页可以从断点继续。',
                    actions: [
                        { label: '取消', kind: '' },
                        { label: '退出', kind: 'primary', onClick: () => Router.go('#/home') }
                    ]
                });
            },

            renderResult() {
                const session = Store.state.quizSession;
                if (!session) { Router.go('#/home'); return; }
                const record = QuizEngine.finish(session);
                const f = this.tpl('tpl-result');
                f.querySelector('#res-rate').textContent = record.rate + '%';
                f.querySelector('#res-right').textContent = record.correct;
                f.querySelector('#res-wrong').textContent = record.total - record.correct;
                const pt = f.querySelector('#res-pertype');
                pt.appendChild(el('h3', { style: 'font-size:var(--fs-h3);font-weight:600;margin-bottom:16px;text-align:left' },
                    '按题型分布'));
                TYPE_ORDER.forEach(t => {
                    const data = record.byType[t];
                    if (!data.total) return;
                    const row = el('div', { class: 'pt-row' });
                    row.appendChild(el('div', { class: 'pt-label' }, TYPES[t]));
                    const track = el('div', { class: 'pt-track' });
                    const fill = el('div', { class: 'pt-fill' });
                    track.appendChild(fill);
                    row.appendChild(track);
                    row.appendChild(el('div', { class: 'pt-num' }, `${data.correct}/${data.total}`));
                    pt.appendChild(row);
                    requestAnimationFrame(() => fill.style.width = (data.total ? (data.correct / data.total * 100) :
                        0) + '%');
                });
                this.mount(f);
                $('#btn-retry').addEventListener('click', () => {
                    const session2 = QuizEngine.create(record.config);
                    if (!session2) { Toast.error('无法创建会话'); return; }
                    Store.setState({ quizSession: session2 });
                    DataLayer.set('activeSession', session2);
                    Router.go('#/quiz');
                });
            },

            renderWrong(params = {}) {
                const f = this.tpl('tpl-wrong');
                const activeType = params.type || 'all';
                const counts = WrongStore.countByType();
                f.querySelector('#wrong-count').textContent = `我的错题集 (${counts.all} 题)`;
                const sb = f.querySelector('#wrong-sidebar');
                sb.appendChild(el('h4', {}, '题型筛选'));
                const items = [{ key: 'all', label: '全部' }, ...TYPE_ORDER.map(t => ({ key: t, label: TYPES[t] }))];
                items.forEach(it => {
                    const c = counts[it.key] || 0;
                    const node = el('div', { class: 'ws-item' + (it.key === activeType ? ' active' : '') });
                    node.appendChild(el('span', {}, it.label));
                    node.appendChild(el('span', { class: 'ws-count' }, c + ''));
                    node.addEventListener('click', () => Router.go('#/wrong?type=' + it.key));
                    sb.appendChild(node);
                });
                const list = f.querySelector('#wrong-list');
                const arr = WrongStore.list(activeType);
                if (!arr.length) {
                    list.appendChild(el('div', { class: 'empty-state' },
                        el('div', { class: 'empty-icon' }, '✨'),
                        el('div', { class: 'empty-title' }, '暂无错题'),
                        el('div', {}, '继续保持，错题都已被你攻克')
                    ));
                } else {
                    arr.forEach(w => {
                        const q = QBank.byId(w.id);
                        if (!q) return;
                        const card = el('button', { class: 'wq-item liquid', onclick: () => UI.practiceWrong(w
                                .id) });
                        const body = el('div', { class: 'wq-body' });
                        const head = el('div', { class: 'wq-head' });
                        head.appendChild(el('span', { class: 'pill-badge' }, TYPES[q.type]));
                        head.appendChild(el('span', { style: 'color:var(--color-text-tertiary);font-size:var(--fs-caption)' },
                            `错 ${w.times} 次`));
                        body.appendChild(head);
                        body.appendChild(el('div', { class: 'wq-stem' }, q.question));
                        body.appendChild(el('div', { class: 'wq-meta' },
                            el('span', {}, '上次错误：' + new Date(w.lastAt).toLocaleString('zh-CN')),
                        ));
                        const del = el('button', { class: 'glass-btn', onclick: (e) => { e.stopPropagation();
                                WrongStore.removeIfPresent(w.id);
                                UI.renderWrong({ type: activeType }); } }, '移除');
                        card.appendChild(body);
                        card.appendChild(del);
                        list.appendChild(card);
                    });
                }
                this.mount(f);
                $('#btn-wrong-clear').onclick = () => {
                    if (!counts.all) { Toast.warn('错题集已是空的'); return; }
                    Modal.show({
                        title: '清空所有错题？',
                        body: `共 ${counts.all} 道错题将被永久删除，无法恢复。`,
                        actions: [{ label: '取消' }, { label: '确认清空', kind: 'danger', onClick: () => { WrongStore
                                    .clear();
                                UI.renderWrong();
                                Toast.success('错题集已清空'); } }]
                    });
                };
                $('#btn-wrong-repractice').onclick = () => {
                    const wrongList = WrongStore.list(activeType);
                    if (!wrongList.length) { Toast.warn('没有可练习的错题'); return; }
                    const types = activeType === 'all' ? TYPE_ORDER : [activeType];
                    const session = QuizEngine.create({ types, count: 0, order: 'random', onlyWrong: true,
                        skipCorrect: true });
                    if (!session) { Toast.error('创建会话失败'); return; }
                    Store.setState({ quizSession: session });
                    DataLayer.set('activeSession', session);
                    Router.go('#/quiz');
                };
            },

            practiceWrong(id) {
                const q = QBank.byId(id);
                if (!q) return;
                const session = {
                    id: 'practice_' + Date.now().toString(36),
                    config: { types: [q.type], count: 1, order: 'sequence', onlyWrong: true, skipCorrect: true },
                    questions: [q],
                    answers: {},
                    currentIdx: 0,
                    startedAt: Date.now(),
                    finishedAt: null,
                };
                Store.setState({ quizSession: session });
                DataLayer.set('activeSession', session);
                Router.go('#/quiz');
            },

            renderStats() {
                const f = this.tpl('tpl-stats');
                const main = f.querySelector('#stats-main');
                const ov = StatsCalc.overall();
                const kpi = el('div', { class: 'kpi-grid' });
                const mk = (label, num, cls = '') => {
                    const c = el('div', { class: 'kpi-card glass-card' });
                    c.appendChild(el('div', { class: 'kpi-label' }, label));
                    c.appendChild(el('div', { class: 'kpi-num ' + cls }, num));
                    return c;
                };
                kpi.appendChild(mk('总刷题数', ov.totalQ + ''));
                kpi.appendChild(mk('总正确率', ov.rate + '%', 'accent'));
                kpi.appendChild(mk('错题数', ov.wrongCount + '', 'warn'));
                kpi.appendChild(mk('错题率', ov.wrongRate + '%', 'danger'));
                main.appendChild(kpi);
                const charts = el('div', { class: 'charts-row' });
                const pieCard = el('div', { class: 'chart-card glass-card' });
                pieCard.appendChild(el('h3', {}, '按题型分布'));
                const byType = StatsCalc.byType();
                const totalByType = TYPE_ORDER.reduce((s, t) => s + byType[t].total, 0);
                if (totalByType === 0) {
                    pieCard.appendChild(el('div', { class: 'empty-chart' }, '尚无数据，先去刷一轮吧'));
                } else {
                    const colors = { single: '#007AFF', multi: '#8B5CF6', judge: '#34C759', essay: '#FF9500' };
                    let acc = 0;
                    const gradStops = TYPE_ORDER.map(t => {
                        const pct = (byType[t].total / totalByType) * 100;
                        const seg = `${colors[t]} ${acc}% ${acc+pct}%`;
                        acc += pct;
                        return seg;
                    }).join(', ');
                    const pieWrap = el('div', { class: 'pie-wrap' });
                    const pie = el('div', { style: `width:140px;height:140px;border-radius:50%;background:conic-gradient(${gradStops});box-shadow:inset 0 0 0 4px rgba(255,255,255,0.5),var(--shadow-md)` });
                    pieWrap.appendChild(pie);
                    const legend = el('div', { class: 'pie-legend' });
                    TYPE_ORDER.forEach(t => {
                        if (byType[t].total === 0) return;
                        const pct = Math.round((byType[t].total / totalByType) * 100);
                        const li = el('div', { class: 'legend-item' });
                        li.appendChild(el('span', { class: 'legend-dot', style: 'background:' + colors[t] }));
                        li.appendChild(el('span', {}, `${TYPES[t]} ${pct}%`));
                        legend.appendChild(li);
                    });
                    pieWrap.appendChild(legend);
                    pieCard.appendChild(pieWrap);
                }
                charts.appendChild(pieCard);
                const lineCard = el('div', { class: 'chart-card glass-card' });
                lineCard.appendChild(el('h3', {}, '近期会话正确率'));
                const recent = StatsCalc.recent(7);
                if (!recent.length) {
                    lineCard.appendChild(el('div', { class: 'empty-chart' }, '暂无历史会话'));
                } else {
                    const w = 320,
                        h = 180,
                        pad = 30;
                    const xs = (i) => pad + i * ((w - pad * 2) / Math.max(1, recent.length - 1));
                    const ys = (v) => h - pad - (v / 100) * (h - pad * 2);
                    const points = recent.map((r, i) => `${xs(i)},${ys(r.rate)}`).join(' ');
                    const svg =
                        `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
                        <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="rgba(120,120,128,0.3)" stroke-width="1"/>
                        <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="rgba(120,120,128,0.3)" stroke-width="1"/>
                        <polyline fill="none" stroke="var(--color-accent)" stroke-width="2.5" points="${points}"/>
                        ${recent.map((r,i)=>`<circle cx="${xs(i)}" cy="${ys(r.rate)}" r="4" fill="var(--color-accent)"><title>${r.date}: ${r.rate}%</title></circle>`).join('')}
                        ${recent.map((r,i)=>`<text x="${xs(i)}" y="${h-pad+16}" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">${r.date}</text>`).join('')}
                    </svg>`;
                    const wrap = el('div', { class: 'line-chart-wrap' });
                    wrap.innerHTML = svg;
                    lineCard.appendChild(wrap);
                }
                charts.appendChild(lineCard);
                main.appendChild(charts);
                if (totalByType > 0) {
                    const bars = el('div', { class: 'per-type-bars glass-card' });
                    bars.appendChild(el('h3', { style: 'font-size:var(--fs-h3);font-weight:600;margin-bottom:16px' },
                        '各题型正确率'));
                    TYPE_ORDER.forEach(t => {
                        if (byType[t].total === 0) return;
                        const row = el('div', { class: 'pt-row' });
                        const rate = Math.round((byType[t].correct / byType[t].total) * 100);
                        row.appendChild(el('div', { class: 'pt-label' }, TYPES[t]));
                        const track = el('div', { class: 'pt-track' });
                        const fill = el('div', { class: 'pt-fill', style: 'width:' + rate + '%' });
                        track.appendChild(fill);
                        row.appendChild(track);
                        row.appendChild(el('div', { class: 'pt-num' }, rate + '%'));
                        bars.appendChild(row);
                    });
                    main.appendChild(bars);
                }
                this.mount(f);
            },

            renderSettings() {
                const f = this.tpl('tpl-settings');
                const cur = Store.state.settings?.theme || 'auto';
                f.querySelectorAll('#theme-seg .seg-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.theme === cur);
                    b.addEventListener('click', () => {
                        Store.updateSettings({ theme: b.dataset.theme });
                        f.querySelectorAll('#theme-seg .seg-btn').forEach(x => x.classList.toggle('active',
                        x === b));
                        Toast.success('主题已切换');
                    });
                });
                const fsSlider = f.querySelector('#fs-slider');
                const fsVal = f.querySelector('#fs-val');
                fsSlider.value = Store.state.settings?.fsQuizStem || 22;
                fsVal.textContent = fsSlider.value;
                fsSlider.addEventListener('input', () => {
                    fsVal.textContent = fsSlider.value;
                    Store.updateSettings({ fsQuizStem: +fsSlider.value });
                });
                const curBg = Store.state.settings?.bgImage || 0;
                f.querySelectorAll('.bg-thumb').forEach(b => {
                    const isActive = +b.dataset.bg === curBg;
                    b.classList.toggle('active', isActive);
                    // 如果 bgImage=0 表示"无背景(白色)"，所有缩略图都不激活
                    if (curBg === 0) b.classList.remove('active');
                    b.addEventListener('click', () => {
                        const bg = +b.dataset.bg;
                        Store.updateSettings({ bgImage: bg });
                        f.querySelectorAll('.bg-thumb').forEach(x => x.classList.toggle('active', +x.dataset
                            .bg === bg));
                        Toast.success('背景已切换');
                    });
                });
                // 如果 bgImage=0，清除所有 active
                if (curBg === 0) {
                    f.querySelectorAll('.bg-thumb').forEach(b => b.classList.remove('active'));
                }
                f.querySelector('#btn-export').addEventListener('click', () => this.exportData());
                f.querySelector('#btn-import').addEventListener('click', () => $('#import-file').click());
                f.querySelector('#import-file').addEventListener('change', (e) => this.importData(e.target.files[0]));
                f.querySelector('#btn-clear-data').addEventListener('click', () => {
                    Modal.show({
                        title: '清空所有数据？',
                        body: '错题集、统计历史、设置
